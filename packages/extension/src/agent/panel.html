<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />
    <title>WebXR</title>
    <style>
      /* Unified dark frosted-glass styling (self-contained: reads in
         both light and dark DevTools). */
      :root {
        --substrate: #101013;
        --hairline: rgba(61, 61, 63, 0.7);
        --p0: #1b1b1d;
        --raised: #202022;
        --inset: #161618;
        --hover: #2a2a2c;
        --text: #ededed;
        --text2: #9c9c9c;
        --text3: #6b6b6e;
        --accent: #2d7ff9;
        --accent-press: #1c6fe0;
        --accent-tint: rgba(45, 127, 249, 0.12);
        --online: #4fe0b0;
        --pending: #ffc861;
        --danger: #f3978f;
        --code: #ceced2;
        --sans: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
        --mono: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        background: var(--substrate);
        color: var(--text);
      }
      body {
        font: 14px/1.5 var(--sans);
      }
      main {
        max-width: 920px;
        padding: 16px;
      }
      h1,
      h2,
      h3 {
        margin: 0;
        line-height: 1.25;
        color: var(--text);
      }
      h1 {
        font-size: 18px;
        font-weight: 600;
      }
      h2 {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 8px;
      }
      h3 {
        font-size: 14px;
        font-weight: 600;
        margin: 14px 0 6px;
      }
      p {
        margin: 6px 0;
      }
      section {
        border-top: 1px solid var(--hairline);
        padding: 16px 0;
      }
      .banner {
        position: relative;
        border: none;
        border-radius: 10px;
        background: var(--accent-tint);
        padding: 12px 12px 12px 15px;
        margin: 12px 0 0;
        overflow: hidden;
      }
      .banner::before {
        content: '';
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 3px;
        background: var(--accent);
      }
      .banner strong {
        font-weight: 600;
      }
      .row {
        display: grid;
        grid-template-columns: minmax(150px, 200px) minmax(200px, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 10px 12px;
        margin: 6px 0;
        border-radius: 10px;
        background: var(--p0);
      }
      .label {
        font-weight: 500;
        color: var(--text);
      }
      .badge {
        font-size: 11px;
        color: var(--text3);
        margin-top: 2px;
      }
      .muted {
        color: var(--text2);
      }
      .pending {
        position: sticky;
        top: 0;
        z-index: 2;
        background: var(--accent-tint);
        color: var(--text);
        border: 1px solid var(--accent);
        border-radius: 8px;
        padding: 8px 12px;
        margin: 10px 0;
        font-weight: 500;
        font-size: 13px;
      }
      select,
      input[type='text'],
      input[type='number'] {
        font: inherit;
        padding: 6px 8px;
        width: 100%;
        box-sizing: border-box;
        background: var(--raised);
        color: var(--text);
        border: 1px solid var(--hairline);
        border-radius: 8px;
      }
      select:focus,
      input:focus {
        outline: none;
        border-color: var(--accent);
        box-shadow: 0 0 0 2px var(--accent-tint);
      }
      input[type='range'] {
        width: 100%;
        appearance: none;
        -webkit-appearance: none;
        height: 6px;
        border-radius: 999px;
        background: var(--inset);
        cursor: pointer;
      }
      input[type='range']::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 6px var(--accent);
      }
      input[type='range']::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border: none;
        border-radius: 50%;
        background: var(--accent);
      }
      label {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      accent-checkbox,
      input[type='checkbox'] {
        accent-color: var(--accent);
      }
      button {
        font: 500 13px var(--sans);
        padding: 7px 12px;
        cursor: pointer;
        background: var(--raised);
        color: var(--text);
        border: 1px solid transparent;
        border-radius: 8px;
        transition: background 0.15s ease;
      }
      button:hover {
        background: var(--hover);
      }
      button.primary {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
        box-shadow: 0 2px 10px rgba(45, 127, 249, 0.3);
      }
      button.primary:hover {
        background: var(--accent-press);
      }
      [data-reset] {
        font-size: 12px;
        color: var(--text2);
        background: transparent;
      }
      [data-reset]:hover {
        background: var(--hover);
        color: var(--text);
      }
      .segment {
        display: inline-flex;
        gap: 2px;
        padding: 2px;
        margin: 10px 0 4px;
        background: var(--raised);
        border-radius: 999px;
      }
      .segment button {
        background: transparent;
        border: none;
        border-radius: 999px;
        color: var(--text2);
        padding: 6px 12px;
      }
      .segment button[aria-pressed='true'] {
        background: var(--accent);
        color: #fff;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 12px;
        align-items: center;
      }
      code,
      pre {
        font-family: var(--mono);
        color: var(--code);
      }
      pre {
        padding: 12px;
        border-radius: 10px;
        overflow: auto;
        background: var(--inset);
        border: 1px solid var(--hairline);
        font-size: 12px;
        line-height: 1.5;
      }
      .codeblock {
        position: relative;
        margin: 10px 0;
      }
      .codeblock pre {
        margin: 0;
        padding-right: 40px;
      }
      .copy-icon {
        position: absolute;
        top: 8px;
        right: 8px;
        width: 28px;
        height: 28px;
        padding: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--raised);
        border: 1px solid var(--hairline);
        border-radius: 7px;
        color: var(--text2);
        cursor: pointer;
      }
      .copy-icon:hover {
        background: var(--hover);
        color: var(--text);
      }
      .copy-icon svg {
        width: 14px;
        height: 14px;
      }
      .copy-icon.copied {
        color: var(--online);
        border-color: rgba(79, 224, 176, 0.45);
      }
      details {
        margin-top: 10px;
      }
      summary {
        cursor: pointer;
        color: var(--text);
        font-weight: 500;
        padding: 6px 0;
      }
      summary::marker {
        color: var(--text3);
      }
      .tool {
        display: grid;
        grid-template-columns: 210px 80px 1fr;
        gap: 8px;
        padding: 8px 12px;
        margin: 4px 0;
        border-radius: 8px;
        background: var(--p0);
        align-items: center;
      }
      .tool code {
        color: var(--text);
      }
      .tool span {
        color: var(--text2);
        font-size: 12px;
      }
      a {
        color: var(--accent);
      }
      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script src="panel.min.js"></script>
  </body>
</html>
